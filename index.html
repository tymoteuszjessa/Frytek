<meta name="apple-mobile-web-app-title" content="Frytek">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  color-scheme: light only;
  --cream:#FFF6E8;
  --sun:#FFC845;
  --sun-dark:#F5A623;
  --amber-text:#8F5209;
  --coral:#C93B27;
  --coral-bright:#FF6B5B;
  --teal:#17766D;
  --teal-bright:#2EC4B6;
  --plum:#3D2352;
  --plum-soft:#6B4C7A;
  --card:#FFFFFF;
  --line:#EAD9BC;
  --gold:#FFD700;
  --silver:#C7CDD6;
  --bronze:#CD7F4E;
  --radius:22px;
  --shadow: 0 6px 0 rgba(61,35,82,0.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Nunito',sans-serif;
  background:
    radial-gradient(circle at 15% 8%, rgba(255,200,69,0.35), transparent 40%),
    radial-gradient(circle at 90% 15%, rgba(46,196,182,0.25), transparent 40%),
    var(--cream);
  color:var(--plum);
  min-height:100vh;
  overscroll-behavior:none;
  user-select:none;
}
h1,h2,h3,.display{font-family:'Baloo 2',sans-serif;}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:112px;padding-top:env(safe-area-inset-top);position:relative;}

#offlineBanner{
  position:fixed; top:0; left:0; right:0; z-index:500;
  background:#FFD23F; color:#241533; font-weight:800; font-size:12.5px; text-align:center;
  padding:10px 16px calc(8px + env(safe-area-inset-top)); padding-top:calc(10px + env(safe-area-inset-top));
  border-bottom:2px solid #241533;
}

/* Top bar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 18px 8px;
  position:relative;
  z-index:20;
}
.pill{
  display:flex;align-items:center;gap:6px;
  background:var(--card); border:2px solid var(--line);
  border-radius:999px; padding:6px 14px; font-weight:800;
  font-family:'Baloo 2',sans-serif; font-size:16px; box-shadow:var(--shadow);
}
.pill .ic{font-size:18px;}
.backbtn{
  background:var(--card); border:2px solid var(--line); border-radius:14px;
  width:42px;height:42px; font-size:20px; display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow); cursor:pointer;
}

/* Frytka mascot */

.screen{ padding:0 18px 18px; animation:fadeIn .25s ease; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

.headline{ text-align:center; margin:2px 0 18px; }

.welcome-stage{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:20px 24px; min-height:calc(100vh - 200px);
}
.welcome-mascot svg{ width:220px; height:263px; filter:drop-shadow(0 12px 0 rgba(61,35,82,0.12)); animation:flIdle 2.6s ease-in-out infinite; overflow:visible; }
.welcome-title{ font-size:28px; margin:18px 0 10px; line-height:1.25; }
.welcome-sub{ color:var(--plum-soft); font-weight:700; font-size:15px; margin:0 0 26px; max-width:280px; }
.welcome-btn{ width:auto; padding:16px 40px; font-size:19px; }
.headline h1{ font-size:26px; margin:0 0 4px; color:var(--plum); }
.headline p{ margin:0; color:var(--plum-soft); font-weight:600; font-size:14.5px; }

/* Module path */
.module-list{ display:flex; flex-direction:column; gap:14px; margin-top:6px; }

.fairy-path{ position:relative; margin:10px auto 30px; }
.fairy-node{ position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; width:150px; }
.fairy-badge{
  width:84px; height:84px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  border:5px solid var(--plum); box-shadow:0 6px 0 rgba(61,35,82,0.18); cursor:pointer; position:relative;
  transition:transform .15s;
}
.fairy-badge:active{ transform:translateY(3px); box-shadow:0 3px 0 rgba(61,35,82,0.18); }
.fairy-badge.locked{ background:#eee; cursor:default; box-shadow:0 4px 0 rgba(61,35,82,0.1); opacity:0.85; }
.fairy-badge.next-up{ animation:fairyGlow 1.8s ease-in-out infinite; }
@keyframes fairyGlow{
  0%,100%{ box-shadow:0 6px 0 rgba(61,35,82,0.18), 0 0 0 0 rgba(255,200,69,0.6); }
  50%{ box-shadow:0 6px 0 rgba(61,35,82,0.18), 0 0 0 10px rgba(255,200,69,0); }
}
.fairy-badge-sm{ width:64px; height:64px; background:white; border-width:4px; }
.fairy-trophy{ position:absolute; top:-10px; right:-10px; background:white; border-radius:50%; border:3px solid var(--plum); padding:3px; }
.fairy-label{ margin-top:8px; text-align:center; font-size:12.5px; font-weight:700; color:var(--plum); line-height:1.35; background:rgba(255,255,255,0.85); border-radius:10px; padding:3px 8px; }
.fairy-sub{ color:var(--plum-soft); font-weight:800; }
.fairy-decor{ position:absolute; opacity:0.9; pointer-events:none; animation:fairyBob 3s ease-in-out infinite; filter:drop-shadow(0 2px 0 rgba(61,35,82,0.1)); }
@keyframes fairyBob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-6px);} }
.module-card{
  background:var(--card); border-radius:var(--radius); padding:16px 18px;
  box-shadow:var(--shadow); border:2px solid var(--line);
  display:flex; align-items:center; gap:14px; cursor:pointer; position:relative;
}
.module-card.locked{ opacity:0.55; }
.module-badge{
  width:56px;height:56px;border-radius:16px; display:flex;align-items:center;justify-content:center;
  font-size:28px; flex-shrink:0;
}
.module-info{flex:1;}
.module-info h3{ margin:0 0 3px; font-size:18px; }
.module-info .sub{ font-size:13px; color:var(--plum-soft); font-weight:700; }
.progress-track{ height:8px; background:var(--line); border-radius:6px; margin-top:8px; overflow:hidden; }
.progress-fill{ height:100%; background:var(--teal); border-radius:6px; transition:width .3s; }
.trophy-mark{ font-size:26px; }

/* Section grid */
.section-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
.section-card{
  background:var(--card); border-radius:18px; padding:14px; text-align:center;
  box-shadow:var(--shadow); border:2px solid var(--line); cursor:pointer; position:relative;
}
.section-card.locked{ opacity:.5; }
.section-card.trophy-locked{ opacity:.45; filter:grayscale(0.8) blur(0.3px); }
.section-card.trophy-locked .section-medal{ filter:blur(1px); opacity:.7; }
.section-medal{ font-size:30px; }
.section-card h4{ margin:8px 0 2px; font-size:13.5px; line-height:1.25; min-height:34px;}
.section-dots{ display:flex; justify-content:center; gap:4px; margin-top:6px;}
.dot{ width:7px;height:7px;border-radius:50%; background:var(--line); }
.dot.done{ background:var(--teal); }

/* Product grid within section */
.product-grid{ display:flex; flex-direction:column; gap:10px; margin-top:8px; }
.product-row{
  background:var(--card); border-radius:16px; padding:12px 14px;
  display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); border:2px solid var(--line);
  cursor:pointer;
}
.product-row.locked{ opacity:.5; }

@keyframes flIdle{ 0%,100%{ transform:translateY(0) rotate(0deg);} 50%{ transform:translateY(-6px) rotate(-1.5deg);} }

function buildWindingPath(n, opts){
  opts = opts || {};
  const width = opts.width || 320;
  const stepY = opts.stepY || 148;
  const marginY = opts.marginY || 66;
  const leftX = opts.leftX || width*0.26;
  const rightX = opts.rightX || width*0.74;
  const points = [];
  for(let i=0;i<n;i++){
    const x = (i%2===0) ? leftX : rightX;
    const y = marginY + i*stepY;
    points.push({x,y});
  }
  let d = `M ${points[0].x},${points[0].y}`;
  for(let i=1;i<points.length;i++){
    const p0 = points[i-1], p1 = points[i];
    const midY = (p0.y+p1.y)/2;
    d += ` C ${p0.x},${midY} ${p1.x},${midY} ${p1.x},${p1.y}`;
  }
  const height = marginY + (n-1)*stepY + marginY*0.7;
  return { points, d, width, height };
}

function cloudDocRef(){

function cloudSaveState(){
  if(!firebaseOK || !currentUser || cloudSyncSuspended) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(()=>{
    const ref = cloudDocRef();
    if(!ref) return;
    ref.set(state).catch(()=>{ /* offline - localStorage still has it, will retry on next change */ });
  }, 600);
}

function progressScore(s){
  return (Object.keys((s && s.done) || {}).length * 1000) + ((s && s.coins) || 0);
}

function cloudLoadState(){
  const ref = cloudDocRef();
  if(!ref) return Promise.resolve();
  const localState = state;
  return ref.get().then(doc=>{
    if(doc.exists){
      const cloudState = doc.data();
      const localIsFurtherAlong = progressScore(localState) > progressScore(cloudState);
      const winner = localIsFurtherAlong ? localState : cloudState;
      cloudSyncSuspended = true;
      state = winner;
      if(state.pin===undefined) state.pin=null;
      if(state.onboarded===undefined) state.onboarded=true;
      if(state.goals===undefined) state.goals=[];
      if(state.lastSeenVersion===undefined) state.lastSeenVersion=null;
      if(state.worn && state.worn.shoes===undefined) state.worn.shoes=null;
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
      cloudSyncSuspended = false;
      if(localIsFurtherAlong){
        // lokalny postęp (np. zrobiony offline) jest bardziej zaawansowany - odeślij go do chmury,
        // żeby nigdy nie zgubić postępów zrobionych zanim synchronizacja zadziałała
        return cloudDocRef().set(state);
      }
    } else {
      // pierwsza synchronizacja tego konta - wyślij obecny lokalny stan do chmury
      return cloudDocRef().set(state);
    }
  }).catch(()=>{ /* offline - działamy na lokalnej kopii */ });
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e=>{
      const img = new Image();
      img.onerror = reject;
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w >= h){ if(w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
        else { if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function byModule(m){ return PRODUCTS.filter(p=>p.module===m); }
function bySection(m,s){ return PRODUCTS.filter(p=>p.module===m && p.section===s); }
function requiredOf(list){ return list.filter(p=>!p.bonus); }
function isDone(id){ return !!state.done[id]; }
function sectionDone(m,s){ return requiredOf(bySection(m,s)).every(p=>isDone(p.id)); }
function moduleDone(m){ return requiredOf(byModule(m)).every(p=>isDone(p.id)); }
function moduleProgress(m){ const secs=sectionsOf(m); const done=secs.filter(s=>sectionDone(m,s)).length; return {done, total:secs.length}; }
function allSections(){ const list=[]; for(let m=1;m<=5;m++){ for(const s of sectionsOf(m)){ list.push([m,s]); } } return list; }
function totalProductsCount(){ return allSections().length; }
function totalProductsDoneCount(){ return allSections().filter(([m,s])=>sectionDone(m,s)).length; }
function moduleUnlocked(m){ if(m===1) return true; return moduleDone(m-1); }
function sectionUnlocked(m,s){ if(s===1) return moduleUnlocked(m); return sectionDone(m,s-1); }
function productUnlocked(p){
  if(!sectionUnlocked(p.module,p.section)) return false;
  if(p.bonus) return sectionDone(p.module,p.section);
  const siblings = requiredOf(bySection(p.module,p.section));
  const idx = siblings.findIndex(x=>x.id===p.id);
  if(idx===0) return true;
  return isDone(siblings[idx-1].id);
}
function sectionsOf(m){ return [...new Set(byModule(m).map(p=>p.section))]; }

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = String(str == null ? '' : str);
  return div.innerHTML;
}

function nearestGoalText(){
  for(const [m,s] of allSections()){
    if(!sectionUnlocked(m,s)) continue;
    if(sectionDone(m,s)) continue;
    const items = requiredOf(bySection(m,s));
    const remaining = items.filter(p=>!isDone(p.id)).length;
    const food = (bySection(m,s).find(p=>!p.bonus) || bySection(m,s)[0]).food;
    if(remaining === items.length){
      return `Zacznijcie od: <b>${food}</b> 🍽️`;
    }
    return `Jeszcze ${remaining} ${remaining===1?'krok':'kroki'} do medalu za <b>${food}</b>! 🥇`;
  }
  return `Wszystko poznane — jesteście mistrzami smaku! 🏆`;
}

function speakFrytek(text){
  if(!('speechSynthesis' in window)) return;
  if(!musicOn) return; // ten sam przełącznik dźwięku co muzyka w tle
  try{
    const clean = text.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').trim();
    if(!clean) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = 'pl-PL';
    utter.pitch = 1.4;
    utter.rate = 1.05;
    utter.volume = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const plVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('pl'));
    if(plVoice) utter.voice = plVoice;
    window.speechSynthesis.speak(utter);
  }catch(e){}
}

function showBubble(text, duration){
  speakFrytek(text);
  const wrap = document.getElementById('mascotWrap');
  const bubble = document.getElementById('speechBubble');
  if(!bubble || !wrap) return;
  bubble.textContent = text;
  bubble.style.left = '50%';
  bubble.style.transform = 'translateX(-50%)';
  // offsetWidth reflects the untransformed layout size, so it's accurate
  // even while a scale() animation is running.
  const bubbleWidth = bubble.offsetWidth;
  const wrapRect = wrap.getBoundingClientRect();
  const wrapCenterX = wrapRect.left + wrapRect.width/2;
  const margin = 10;
  let desiredLeft = wrapCenterX - bubbleWidth/2;
  desiredLeft = Math.max(margin, Math.min(window.innerWidth - margin - bubbleWidth, desiredLeft));
  bubble.style.left = (desiredLeft - wrapRect.left) + 'px';
  bubble.style.transform = 'scale(0.7)';
  bubble.classList.remove('show');
  void bubble.offsetWidth;
  bubble.classList.add('show');
  bubble.style.transform = 'scale(1)';

  clearTimeout(bubble._hideTimer);
  bubble._hideTimer = setTimeout(()=>{ bubble.classList.remove('show'); }, duration);
}

function renderMascot(){
  const wrap = document.getElementById('mascotWrap');
  if(!wrap) return;
  const isFirstRun = !wrap.style.left;
  wrap.innerHTML = frytkaSVG() + '<div class="speech-bubble" id="speechBubble"></div>';
  if(isFirstRun){
    wrap.style.right = 'auto';
    wrap.style.left = (window.innerWidth - 132) + 'px';
    wrap.style.top = (window.innerHeight - 260) + 'px';
    wrap.classList.add('entering');
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        wrap.classList.remove('entering');
        if(state.onboarded){
          showBubble('Cześć! Jestem Frytek! 👋', 2600);
        }
      });
    });
  }
}

let quizState = null;

function buildQuiz(){
  const doneFoods = allSections()
    .filter(([m,s])=>sectionDone(m,s))
    .map(([m,s])=>{
      const items = bySection(m,s);
      return items.find(p=>!p.bonus) || items[0];
    });
  if(doneFoods.length < 3) return null;
  const shuffled = [...doneFoods].sort(()=>Math.random()-0.5);
  const count = Math.min(5, shuffled.length);
  const questions = [];
  for(let i=0;i<count;i++){
    const p = shuffled[i];
    const questionType = Math.random() < 0.5 ? 'witaminy' : 'skladniki';
    const correct = p[questionType];
    const decoys = doneFoods.filter(x=>x.food!==p.food && x[questionType]!==correct)
      .map(x=>x[questionType]);
    const uniqueDecoys = [...new Set(decoys)].sort(()=>Math.random()-0.5).slice(0,2);
    while(uniqueDecoys.length < 2){
      uniqueDecoys.push(["witamina C","błonnik","wapń","białko"][Math.floor(Math.random()*4)]);
    }
    const options = [correct, ...uniqueDecoys].sort(()=>Math.random()-0.5);
    questions.push({
      product: p,
      question: questionType==='witaminy' ? `Jakie witaminy/wartości ma ${p.food}?` : `Jakie składniki ma ${p.food}?`,
      options,
      correct
    });
  }
  return { questions, idx:0, score:0 };
}

function startQuiz(){
  quizState = buildQuiz();
  if(!quizState){
    showOverlay('🧠', 'Za wcześnie na quiz!', 'Spróbuj najpierw kilku produktów, żeby quiz miał o co pytać.', 0);
    return;
  }
  renderQuizModal();
}

function renderQuizModal(){
  let modal = document.getElementById('quizModal');
  if(!modal){
    modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.id = 'quizModal';
    document.body.appendChild(modal);
  }
  const q = quizState.questions[quizState.idx];
  modal.innerHTML = `
    <div class="modal-card" style="text-align:left;">
      <p style="text-align:center; font-weight:800; color:var(--teal); margin-bottom:2px;">Pytanie ${quizState.idx+1}/${quizState.questions.length}</p>
      <h3 style="text-align:center;">${q.question}</h3>
      <div id="quizOptions" style="display:flex; flex-direction:column; gap:10px; margin-top:14px;">
        ${q.options.map((o,i)=>`<button class="mini-btn quiz-opt" style="padding:12px; background:var(--cream); color:var(--plum);" onclick="answerQuiz(${i})">${o}</button>`).join('')}
      </div>
    </div>`;
}

function answerQuiz(i){
  const q = quizState.questions[quizState.idx];
  const chosen = q.options[i];
  const correct = chosen === q.correct;
  if(correct){
    quizState.score++;
    state.coins += 3;

const PIN_ATTEMPTS_KEY = "frytka_pin_attempts_v1";
const PIN_MAX_ATTEMPTS = 5;
const PIN_LOCKOUT_MS = 60000; // 60 sekund blokady po zbyt wielu złych próbach

function getPinAttemptState(){
  try{
    const raw = localStorage.getItem(PIN_ATTEMPTS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { count:0, lockedUntil:0 };
}
function savePinAttemptState(s){
  try{ localStorage.setItem(PIN_ATTEMPTS_KEY, JSON.stringify(s)); }catch(e){}
}
function pinLockRemainingMs(){
  return Math.max(0, getPinAttemptState().lockedUntil - Date.now());
}
function registerFailedPinAttempt(){
  const s = getPinAttemptState();
  s.count = (s.count||0) + 1;
  if(s.count >= PIN_MAX_ATTEMPTS){
    s.lockedUntil = Date.now() + PIN_LOCKOUT_MS;
    s.count = 0;
  }
  savePinAttemptState(s);
}
function registerSuccessfulPinAttempt(){
  savePinAttemptState({ count:0, lockedUntil:0 });
}

let pinLockTimer = null;

function openPinModal(mode, onSuccess){

  const div = document.createElement('div');

function startPinLockWatcher(){
  clearInterval(pinLockTimer);
  pinLockTimer = setInterval(()=>{
    if(!document.getElementById('pinModal')){ clearInterval(pinLockTimer); return; }
    if(pinLockRemainingMs() <= 0){ clearInterval(pinLockTimer); }
    refreshPinModal();
  }, 1000);
}

function pinTitle(){
  if(pinState.mode==='setup1' || pinState.mode==='change1') return 'Ustaw PIN rodzica';
  if(pinState.mode==='setup2' || pinState.mode==='change2') return 'Powtórz PIN';
  return 'Podaj PIN rodzica';
}
function pinSub(){
  if(pinState.mode==='setup1' || pinState.mode==='change1') return 'Ten PIN będzie potrzebny do potwierdzania spróbowanych produktów.';
  if(pinState.mode==='setup2' || pinState.mode==='change2') return 'Wpisz ten sam PIN jeszcze raz.';
  return 'Poproś rodzica, żeby wpisał swój PIN.';
}

function pinModalHTML(){
  const dots = [0,1,2,3].map(i=>`<div class="d ${i<pinState.entry.length?'filled':''}"></div>`).join('');
  const isVerify = pinState.mode==='verify';
  const lockedMs = isVerify ? pinLockRemainingMs() : 0;
  const locked = lockedMs > 0;
  const lockedSeconds = Math.ceil(lockedMs/1000);
  return `
    <div class="modal-card">
      <h3>${pinTitle()}</h3>
      <p>${locked ? `Zbyt wiele prób. Spróbuj ponownie za ${lockedSeconds}s.` : pinSub()}</p>
      <div class="pin-dots">${dots}</div>
      <div class="pin-pad" style="${locked?'opacity:0.4; pointer-events:none;':''}">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinPress(${n})">${n}</button>`).join('')}
        <button onclick="closeModal('pinModal')" style="background:transparent;border:none;box-shadow:none;color:var(--plum-soft)">Anuluj</button>
        <button onclick="pinPress(0)">0</button>
        <button onclick="pinBackspace()" style="background:transparent;border:none;box-shadow:none;">⌫</button>
      </div>
      <div class="pin-error" id="pinError"></div>
    </div>`;
}

function refreshPinModal(){
  const card = document.querySelector('#pinModal .modal-card');
  if(card) card.outerHTML = pinModalHTML().trim();
}

function pinPress(n){
  if(pinState.mode==='verify' && pinLockRemainingMs() > 0) return;
  if(pinState.entry.length>=4) return;
  pinState.entry += String(n);
  refreshPinModal();
  if(pinState.entry.length===4) setTimeout(handlePinComplete, 150);
}
function pinBackspace(){
  pinState.entry = pinState.entry.slice(0,-1);
  refreshPinModal();
}

function handlePinComplete(){
  const mode = pinState.mode;
  if(mode==='setup1' || mode==='change1'){
    pinState.first = pinState.entry;
    pinState.entry = "";
    pinState.mode = mode==='setup1' ? 'setup2' : 'change2';
    refreshPinModal();
  } else if(mode==='setup2' || mode==='change2'){
    if(pinState.entry === pinState.first){
      state.pin = pinState.entry;
      saveState();
      closeModal('pinModal');
      if(pinState.onSuccess) pinState.onSuccess();
    } else {
      const err = document.getElementById('pinError');
      if(err) err.textContent = 'PIN-y się różnią, spróbuj ponownie.';
      pinState.entry = ""; pinState.first = ""; pinState.mode = mode==='setup2'?'setup1':'change1';
      refreshPinModal();
    }
  } else if(mode==='verify'){
    if(pinLockRemainingMs() > 0){
      pinState.entry = "";
      refreshPinModal();
      return;
    }
    if(pinState.entry === state.pin){
      registerSuccessfulPinAttempt();
      closeModal('pinModal');
      if(pinState.onSuccess) pinState.onSuccess();
    } else {
      registerFailedPinAttempt();
      const err = document.getElementById('pinError');
      const remaining = pinLockRemainingMs();
      if(err) err.textContent = remaining>0 ? '' : 'Zły PIN, spróbuj jeszcze raz.';
      pinState.entry = "";
      refreshPinModal();
      if(remaining > 0) startPinLockWatcher();
    }
  }
}

/* ---- Chiptune background music (Web Audio, polyphonic, retro Nokia-game style) ---- */
let audioCtx = null;
let audioUnlocked = false;
let audioDestination = null;
let musicGainNode = null;

document.addEventListener('visibilitychange', ()=>{
  if(!audioCtx) return;
  if(document.hidden){
    audioCtx.suspend().catch(()=>{});
  } else if(musicOn){
    audioCtx.resume().catch(()=>{});
  }
});

function getAudioCtx(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    // Route synthesized audio through a real <audio> element (MediaStream) so it
    // plays as "media" rather than "ambient" sound - this is what lets it ignore
    // the iPhone's physical silent/ring switch, unlike raw Web Audio output.
    if(audioCtx.createMediaStreamDestination){
      audioDestination = audioCtx.createMediaStreamDestination();
      const audioEl = document.getElementById('audioOut');
      if(audioEl){
        audioEl.srcObject = audioDestination.stream;
        audioEl.play().catch(()=>{});
      }
    } else {
      audioDestination = audioCtx.destination;
    }
    musicGainNode = audioCtx.createGain();
    musicGainNode.gain.value = 1;
    musicGainNode.connect(audioDestination);
  }
  if(audioCtx.state !== 'running'){
    audioCtx.resume();
  }
  const audioEl = document.getElementById('audioOut');
  if(audioEl && audioEl.paused) audioEl.play().catch(()=>{});
  if(!audioUnlocked){
    // iOS Safari unlock trick: play a silent buffer synchronously within the user gesture
    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(audioCtx.destination);
    src.start(0);
    audioUnlocked = true;
  }
  return audioCtx;
}

let musicOn = false;
let musicLoopTimer = null;
let musicGeneration = 0;
let activeMusicNodes = [];
let musicToggleBusy = false;

const NOTE_FREQ = {
  C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
  C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00, B5:987.77,
  C6:1046.50
};

// step length in seconds (slower, gentler pace)
const STEP = 0.2;
// Lead voice (melody) - soft, gentle lullaby-like tune (no harsh high notes)
const LEAD = [
  ["E5",1],["G5",1],["A5",1],["G5",1], ["E5",1],["D5",1],["E5",2],
  ["D5",1],["F5",1],["A5",1],["F5",1], ["D5",1],["C5",1],["D5",2],
  ["C5",1],["E5",1],["G5",1],["E5",1], ["C5",1],["B4",1],["C5",2],
  ["G4",1],["C5",1],["E5",1],["G5",1], ["E5",1],["C5",1],["G4",2],
];
// Harmony voice (plays simultaneously, a third/sixth below - polyphony)
const HARM = [
  ["C5",1],["E5",1],["G5",1],["E5",1], ["C5",1],["B4",1],["C5",2],
  ["B4",1],["D5",1],["F5",1],["D5",1], ["B4",1],["A4",1],["B4",2],
  ["A4",1],["C5",1],["E5",1],["C5",1], ["A4",1],["G4",1],["A4",2],
  ["E4",1],["G4",1],["C5",1],["E5",1], ["C5",1],["G4",1],["E4",2],
];

function scheduleVoice(seq, type, gainVal, startTime){
  let t = startTime;
  for(const [note, len] of seq){
    const freq = NOTE_FREQ[note];
    const dur = STEP*len;
    if(freq){
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 2200;
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(gainVal, t+0.05);
      gain.gain.setValueAtTime(gainVal, t+dur*0.65);
      gain.gain.linearRampToValueAtTime(0, t+dur*0.98);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(musicGainNode);
      osc.start(t);
      osc.stop(t+dur);
    }
    t += dur;
  }
  return t - startTime;
}

function playMusicLoop(gen){
  if(!musicOn || !audioCtx || gen !== musicGeneration) return;
  const now = audioCtx.currentTime + 0.05;
  const loopLen = scheduleVoice(LEAD, 'triangle', 0.045, now);
  scheduleVoice(HARM, 'sine', 0.03, now);
  musicLoopTimer = setTimeout(()=>playMusicLoop(gen), loopLen*1000 - 60);
}

function toggleMusic(){
  if(musicToggleBusy) return;
  musicToggleBusy = true;
  setTimeout(()=>{ musicToggleBusy = false; }, 300);

  if(!musicOn){
    getAudioCtx();
    musicOn = true;
    musicGeneration++;
    if(musicLoopTimer) clearTimeout(musicLoopTimer);
    musicGainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    musicGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    musicGainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.15);
    playMusicLoop(musicGeneration);
  } else {
    musicOn = false;
    musicGeneration++;
    if(musicLoopTimer) clearTimeout(musicLoopTimer);
    if(audioCtx && musicGainNode){
      musicGainNode.gain.cancelScheduledValues(audioCtx.currentTime);
      musicGainNode.gain.setValueAtTime(musicGainNode.gain.value, audioCtx.currentTime);
      musicGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
    }
  }
  render();
}

/* ---- Drag Frytek anywhere on screen (like the old Office paperclip) ---- */
let dragState = null;

function mascotPointerDown(e){
  const wrap = document.getElementById('mascotWrap');
  if(!wrap) return;
  const rect = wrap.getBoundingClientRect();
  dragState = {
    startX: e.clientX, startY: e.clientY,
    origLeft: rect.left, origTop: rect.top,
    w: rect.width, h: rect.height,
    moved: false,
    wrap
  };
  wrap.style.position = 'fixed';
  wrap.style.right = 'auto';
  wrap.style.left = rect.left + 'px';
  wrap.style.top = rect.top + 'px';
  wrap.style.margin = '0';
  wrap.classList.add('dragging');
  wrap.setPointerCapture && wrap.setPointerCapture(e.pointerId);
  wrap.addEventListener('pointermove', mascotPointerMove);
  wrap.addEventListener('pointerup', mascotPointerUp);
  wrap.addEventListener('pointercancel', mascotPointerUp);
}

function mascotPointerMove(e){
  if(!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  if(Math.abs(dx) > 6 || Math.abs(dy) > 6) dragState.moved = true;
  let newLeft = dragState.origLeft + dx;
  let newTop = dragState.origTop + dy;
  newLeft = Math.max(4, Math.min(window.innerWidth - dragState.w - 4, newLeft));
  newTop = Math.max(4, Math.min(window.innerHeight - dragState.h - 4, newTop));
  dragState.wrap.style.left = newLeft + 'px';
  dragState.wrap.style.top = newTop + 'px';
}

function mascotPointerUp(e){
  if(!dragState) return;
  const wrap = dragState.wrap;
  const wasMoved = dragState.moved;
  wrap.removeEventListener('pointermove', mascotPointerMove);
  wrap.removeEventListener('pointerup', mascotPointerUp);
  wrap.removeEventListener('pointercancel', mascotPointerUp);
  wrap.classList.remove('dragging');
  dragState = null;
  if(!wasMoved){
    pokeFrytek();
  }
}

    const dur = 0.09 + Math.random()*0.06;

    osc.type = 'sawtooth';

    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.06, t+dur*0.25);

    gain.gain.setValueAtTime(0, t+dur+0.005);
    osc.connect(gain);
    gain.connect(audioDestination);
    osc.start(t);
    osc.stop(t+dur+0.01);
    osc.onended = ()=>{
      try{ osc.disconnect(); }catch(e){}
      try{ gain.disconnect(); }catch(e){}
    };
    t += dur + 0.02 + Math.random()*0.02;

let swipeState = null;

function swipeStart(e){
  if(!SCREEN_ORDER.includes(route.screen)){ swipeState = null; return; }
  if(e.target.closest('.trophy-row')){ swipeState = null; return; }
  const t = e.touches[0];
  swipeState = { x0:t.clientX, y0:t.clientY, dx:0, dy:0 };
}
function swipeMove(e){
  if(!swipeState) return;
  const t = e.touches[0];
  swipeState.dx = t.clientX - swipeState.x0;
  swipeState.dy = t.clientY - swipeState.y0;
}
function swipeEnd(){
  if(!swipeState) return;
  const { dx, dy } = swipeState;
  swipeState = null;
  if(Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)*1.3) return;
  const idx = SCREEN_ORDER.indexOf(route.screen);
  if(idx === -1) return;
  if(dx < 0 && idx < SCREEN_ORDER.length-1) go({screen: SCREEN_ORDER[idx+1]});
  else if(dx > 0 && idx > 0) go({screen: SCREEN_ORDER[idx-1]});
}
function initSwipeNav(){
  const app = document.getElementById('app');
  if(!app) return;
  app.addEventListener('touchstart', swipeStart, {passive:true});
  app.addEventListener('touchmove', swipeMove, {passive:true});
  app.addEventListener('touchend', swipeEnd, {passive:true});
}

function initApp(){
  render();
  renderMascot();
  scheduleIdleAction();
  maybeShowOnboarding();
  initSwipeNav();
  maybeShowChangelog();
}

function showOfflineBanner(){
  const div = document.createElement('div');
  div.id = 'offlineBanner';
  div.innerHTML = `⚠️ Tryb offline — postępy zapisują się TYLKO na tym urządzeniu i nie synchronizują się z innymi. Spróbuj otworzyć apkę ponownie później.`;
  document.body.appendChild(div);
}

function maybeShowChangelog(){
  if(state.lastSeenVersion === APP_VERSION) return;
  state.lastSeenVersion = APP_VERSION;
  saveState();

  const entry = CHANGELOG.find(c => c.version === APP_VERSION) || CHANGELOG[0];
  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.id = 'changelogModal';
  div.innerHTML = `
    <div class="modal-card" style="text-align:left;">
      <div style="text-align:center;font-size:38px;">🎉</div>
      <h3 style="text-align:center;">Co nowego?</h3>
      <ul style="margin:12px 0; padding-left:20px; font-size:14.5px; font-weight:600; line-height:1.7; color:var(--plum);">
        ${entry.changes.map(c=>`<li>${c}</li>`).join('')}
      </ul>
      <button class="btn btn-primary" style="margin-top:6px;" onclick="closeModal('changelogModal')">Super, zaczynamy!</button>
    </div>`;
  document.body.appendChild(div);
}

function maybeShowOnboarding(){
  if(state.onboarded) return;
  const overlay = document.createElement('div');
  overlay.className = 'onboarding-overlay';
  overlay.id = 'onboardingOverlay';
  let step = 1;

  function renderStep(){
    if(step === 1){
      overlay.innerHTML = `
        <div class="onboarding-card">
          <div style="font-size:44px;">🍟</div>
          <h2>FRYTEK<br>Odkrywca Smaku!</h2>
          <p>To gra, w którą grasz <b>razem z dzieckiem</b> — nie jako nadzorca, tylko jako współodkrywca! Wspólnie próbujecie kolejnych produktów — od najłagodniejszych po najbardziej odważne — robicie sobie zdjęcia przy każdej próbie i zdobywacie monety, medale i puchary.</p>
          <button class="btn btn-primary" style="margin-top:8px;" onclick="window.__onboardingNext()">Dalej →</button>
        </div>`;
    } else {
      overlay.innerHTML = `
        <div class="onboarding-card">
          <div class="onboarding-frytek">${frytkaSVG()}</div>
          <h2>To jest Frytek!</h2>
          <p>Będzie Wam towarzyszyć przez całą wspólną przygodę. Wybierajcie produkty <b>i próbujcie ich razem</b> — rodzic pierwszy albo na spółkę z dzieckiem! Zróbcie sobie wspólne zdjęcie przy każdej próbie, a rodzic potwierdzi to PIN-em. Możecie przeciągać Frytka po ekranie i ubierać go w Szafie!</p>
          <button class="btn btn-primary" style="margin-top:8px;" onclick="window.__onboardingDone()">Zaczynamy! 🎉</button>
        </div>`;
    }
  }

  window.__onboardingNext = ()=>{ step = 2; renderStep(); };
  window.__onboardingDone = ()=>{
    document.body.removeChild(overlay);
    state.onboarded = true;
    saveState();
    showBubble('Cześć! Jestem Frytek! 👋', 2600);
  };

  renderStep();
  document.body.appendChild(overlay);
}

/* ---- Ekran logowania - rodzinne konto (e-mail + hasło) ---- */
function renderAuthScreen(mode, errorMsg){
  mode = mode || 'signin';
  const isSignUp = mode === 'signup';
  document.getElementById('app').innerHTML = `
    <div class="welcome-stage">
      <div class="welcome-mascot">${frytkaSVG()}</div>
      <h1 class="welcome-title">${isSignUp ? 'Załóż konto rodzinne' : 'Zaloguj się'}</h1>
      <p class="welcome-sub">Wszystkie urządzenia zalogowane na to samo konto będą widzieć te same postępy.</p>
      <input id="authEmail" type="email" autocomplete="email" placeholder="E-mail" style="width:100%; max-width:280px; padding:14px; border-radius:14px; border:2px solid var(--line); margin-bottom:10px; font-size:16px; background:white; color:var(--plum); box-sizing:border-box;">
      <input id="authPassword" type="password" autocomplete="${isSignUp?'new-password':'current-password'}" placeholder="Hasło" style="width:100%; max-width:280px; padding:14px; border-radius:14px; border:2px solid var(--line); margin-bottom:${isSignUp?'10px':'6px'}; font-size:16px; background:white; color:var(--plum); box-sizing:border-box;">
      ${isSignUp ? `<input id="authPassword2" type="password" autocomplete="new-password" placeholder="Powtórz hasło" style="width:100%; max-width:280px; padding:14px; border-radius:14px; border:2px solid var(--line); margin-bottom:6px; font-size:16px; background:white; color:var(--plum); box-sizing:border-box;">` : ''}
      ${errorMsg ? `<p style="color:var(--coral); font-weight:700; font-size:13.5px; margin:6px 0;">${errorMsg}</p>` : ''}
      <button class="btn btn-primary welcome-btn" style="max-width:280px; width:100%;" onclick="submitAuth('${mode}')">${isSignUp ? 'Załóż konto' : 'Zaloguj się'}</button>
      <button class="btn btn-ghost" style="max-width:280px; width:100%;" onclick="renderAuthScreen('${isSignUp?'signin':'signup'}')">${isSignUp ? 'Mam już konto — zaloguj się' : 'Pierwszy raz? Załóż konto rodzinne'}</button>
      ${!isSignUp ? `<p style="margin-top:14px;"><a href="#" onclick="resetPassword(); return false;" style="color:var(--plum-soft); font-size:13px;">Zapomniałeś hasła?</a></p>` : ''}
    </div>`;
}

function submitAuth(mode){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if(!email || !password){ renderAuthScreen(mode, 'Uzupełnij e-mail i hasło.'); return; }
  if(mode === 'signup'){
    const password2 = document.getElementById('authPassword2').value;
    if(password !== password2){ renderAuthScreen(mode, 'Hasła się różnią — wpisz to samo w obu polach.'); return; }
  }
  const action = mode === 'signup'
    ? fbAuth.createUserWithEmailAndPassword(email, password)
    : fbAuth.signInWithEmailAndPassword(email, password);
  action.catch(err=>{
    let msg = 'Coś poszło nie tak (' + (err.code || 'nieznany błąd') + '). Spróbuj ponownie.';
    if(err.code==='auth/email-already-in-use') msg = 'To konto już istnieje — zaloguj się zamiast zakładać nowe.';
    if(err.code==='auth/invalid-email') msg = 'Nieprawidłowy adres e-mail.';
    if(err.code==='auth/weak-password') msg = 'Hasło musi mieć co najmniej 6 znaków.';
    if(err.code==='auth/wrong-password' || err.code==='auth/invalid-credential') msg = 'Złe hasło albo e-mail.';
    if(err.code==='auth/user-not-found') msg = 'Nie znaleźliśmy takiego konta — załóż nowe.';
    if(err.code==='auth/unauthorized-domain') msg = 'Ta strona nie jest jeszcze autoryzowana w Firebase (Authentication → Settings → Authorized domains).';
    if(err.code==='auth/operation-not-allowed') msg = 'Logowanie e-mailem nie jest włączone w Firebase (Authentication → Sign-in method).';
    renderAuthScreen(mode, msg);
  });
  // onAuthStateChanged (poniżej) przejmie dalszy start apki po udanym logowaniu
}

function resetPassword(){
  const email = document.getElementById('authEmail').value.trim();
  if(!email){ renderAuthScreen('signin', 'Wpisz najpierw swój e-mail powyżej.'); return; }
  fbAuth.sendPasswordResetEmail(email)
    .then(()=> renderAuthScreen('signin', 'Wysłaliśmy link do zresetowania hasła na Twój e-mail.'))
    .catch(()=> renderAuthScreen('signin', 'Nie udało się wysłać e-maila — sprawdź adres.'));
}

function logOut(){
  if(firebaseOK) fbAuth.signOut();
}

if(firebaseOK){
  fbAuth.onAuthStateChanged(user=>{
    if(user){
      currentUser = user;
      cloudLoadState().then(initApp);
    } else {
      currentUser = null;
      renderAuthScreen('signin');
    }
  });
} else {
  // Firebase niedostępny (np. problem z siecią/blokada) - apka rusza normalnie,
  // lokalnie na tym urządzeniu, bez logowania i synchronizacji w chmurze.
  initApp();
  showOfflineBanner();
}
</script>
